{% extends "base.html" %}
{% block content %}
<div class="auth-container" style="max-width: 800px;">
    <div class="text-center">
        <h2><i class="fa-solid fa-bed-pulse" style="color: var(--primary-pink)"></i> Post-Maternal Care</h2>
        <p>Focusing on your recovery and physical well-being after childbirth.</p>
    </div>
    <div class="dashboard-grid" style="padding: 0; margin-top:20px;">
        <div class="dashboard-card">
            <h4>Recovery Tracker</h4>
            <p>Log your vitals and physical healing progress.</p>
            <button class="btn">Log Vitals</button>
        </div>
        <div class="dashboard-card">
            <h4>Mental Wellbeing</h4>
            <p>Postpartum screening and meditation exercises.</p>
            <button class="btn btn-secondary">Listen Audio</button>
        </div>
    </div>
</div>
{% endblock %}
