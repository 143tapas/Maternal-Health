{% extends "base.html" %}
{% block content %}
<div class="auth-container">
    <h2 class="text-center mb-4"><i class="fas fa-sign-in-alt"></i> Welcome Back</h2>
    <form method="POST" action="/login">
        <div class="form-group">
            <label for="email_or_phone">Email or Phone Number</label>
            <input type="text" id="email_or_phone" name="email_or_phone" class="form-control" required placeholder="Enter your email or phone">
        </div>
        <div class="form-group">
            <label for="password">Password</label>
            <input type="password" id="password" name="password" class="form-control" required placeholder="Enter your password">
        </div>
        <button type="submit" class="btn" style="width: 100%;">Login</button>
    </form>
    <p class="text-center mt-4">Don't have an account? <a href="{{ url_for('register') }}" style="color: var(--primary-pink); font-weight: bold;">Sign Up</a></p>
</div>
{% endblock %}
