{% extends "base.html" %}
{% block content %}
<div class="auth-container">
    <h2 class="text-center mb-4"><i class="fa-solid fa-user-plus"></i> Create Account</h2>
    <form method="POST" action="/register">
        <div class="form-group">
            <label for="name">Full Name</label>
            <input type="text" id="name" name="name" class="form-control" required placeholder="Your full name">
        </div>
        <div class="form-group">
            <label for="email">Email Address</label>
            <input type="email" id="email" name="email" class="form-control" placeholder="Optional if using phone">
        </div>
        <div class="form-group">
            <label for="phone">Phone Number</label>
            <input type="tel" id="phone" name="phone" class="form-control" placeholder="Optional if using email">
        </div>
        <div class="form-group">
            <label for="password">Password</label>
            <input type="password" id="password" name="password" class="form-control" required placeholder="Create a strong password">
        </div>
        <div class="form-group">
            <label for="role">I am a:</label>
            <select id="role" name="role" class="form-control" required>
                <option value="Mother">Mother / Expecting Mother</option>
                <option value="Family">Family Member</option>
                <option value="Doctor">Doctor / Caregiver</option>
            </select>
        </div>
        <button type="submit" class="btn btn-secondary" style="width: 100%;">Sign Up</button>
    </form>
    <p class="text-center mt-4">Already have an account? <a href="{{ url_for('login') }}" style="color: var(--primary-blue); font-weight: bold;">Login</a></p>
</div>
{% endblock %}
